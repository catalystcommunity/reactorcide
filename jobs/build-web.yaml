name: build-web
image: golang:1.26-alpine
capabilities:
  - builder
run_as:
  user: root
command: |-
  sh -c '
    set -euo pipefail

    echo "Building web UI image: $REGISTRY/$IMAGE:$TAG"

    # Install buildctl and git. buildkitd is provided by the builder sidecar.
    apk add --no-cache git
    BUILDKIT_VERSION=0.17.3
    wget -q "https://github.com/moby/buildkit/releases/download/v${BUILDKIT_VERSION}/buildkit-v${BUILDKIT_VERSION}.linux-amd64.tar.gz" -O /tmp/buildkit.tar.gz
    tar -xzf /tmp/buildkit.tar.gz -C /usr/local bin/buildctl
    rm /tmp/buildkit.tar.gz
    for i in $(seq 1 30); do
      if buildctl debug info >/dev/null 2>&1; then
        break
      fi
      sleep 1
    done
    export HOME=/root
    mkdir -p "$HOME/.docker"
    AUTH=$(printf "%s:%s" "$REGISTRY_USER" "$REGISTRY_PASSWORD" | base64 -w 0)
    printf "{\"auths\":{\"%s\":{\"auth\":\"%s\"}}}\n" "$REGISTRY" "$AUTH" > "$HOME/.docker/config.json"

    # Build the Go binary
    echo "Building reactorcide-web binary..."
    cd /job/src/webapp
    CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-w -s" -o reactorcide-web .

    # Copy binary to deployment directory
    cp reactorcide-web /job/src/deployment/

    # Build container image
    echo "Building container image..."
    cd /job/src/deployment
    buildctl build \
      --frontend dockerfile.v0 \
      --local context=. \
      --local dockerfile=. \
      --opt filename=Dockerfile.web \
      --opt build-arg:CACHEBUST=$(date +%s) \
      --output type=image,name="$REGISTRY/$IMAGE:$TAG",push=true

    # Cleanup
    rm -f /job/src/deployment/reactorcide-web

    echo "Done! Image pushed to $REGISTRY/$IMAGE:$TAG"
  '
environment:
  REGISTRY: containers.catalystsquad.com
  IMAGE: public/reactorcide/web
  TAG: dev
  REGISTRY_USER: "${env:REGISTRY_USER}"
  REGISTRY_PASSWORD: "${secret:reactorcide/local-dev:registry_password}"
