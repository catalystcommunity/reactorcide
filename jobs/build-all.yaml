name: build-all-images
image: golang:1.25-alpine
capabilities:
  - builder
command: |-
  sh -c '
    set -euo pipefail

    echo "========================================"
    echo "Building all Reactorcide images (tag: $TAG)"
    echo "========================================"

    # Setup environment. BUILDKIT_HOST is injected by the builder capability —
    # the sidecar runs buildkitd, we only need the buildctl client here.
    export HOME=/root
    mkdir -p $HOME/.docker

    apk add --no-cache git

    BUILDKIT_VERSION=0.17.3
    wget -q "https://github.com/moby/buildkit/releases/download/v${BUILDKIT_VERSION}/buildkit-v${BUILDKIT_VERSION}.linux-amd64.tar.gz" -O /tmp/buildkit.tar.gz
    tar -xzf /tmp/buildkit.tar.gz -C /usr/local bin/buildctl
    rm /tmp/buildkit.tar.gz

    # Wait until the sidecar is serving (normally ~instant, but the job can
    # race startup on a cold-pulled image).
    for i in $(seq 1 30); do
      if buildctl debug info >/dev/null 2>&1; then
        echo "builder sidecar is ready"
        break
      fi
      sleep 1
    done

    # Setup registry auth for buildkit
    echo "Configuring registry authentication..."
    AUTH=$(printf "%s:%s" "$REGISTRY_USER" "$REGISTRY_PASSWORD" | base64 -w 0)
    printf "{\"auths\":{\"%s\":{\"auth\":\"%s\"}}}\n" "$REGISTRY" "$AUTH" > $HOME/.docker/config.json

    # Helper function to build and push with buildctl
    build_and_push() {
      local context="$1"
      local dockerfile="$2"
      local image="$3"
      echo "Building and pushing $image..."
      buildctl build \
        --frontend dockerfile.v0 \
        --local context="$context" \
        --local dockerfile="$context" \
        --opt build-arg:CACHEBUST=$(date +%s) \
        --opt filename="$dockerfile" \
        --no-cache \
        --output type=image,name="$image",push=true
    }

    # Build runnerbase
    echo ""
    echo ">>> Building runnerbase..."
    echo "----------------------------------------"
    build_and_push /job/src/runnerlib Dockerfile.runner "$REGISTRY/public/reactorcide/runnerbase:$TAG"

    # Build Go binary (shared by coordinator and worker)
    echo ""
    echo ">>> Building Go binary..."
    echo "----------------------------------------"
    cd /job/src/coordinator_api
    CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -buildvcs=false -o reactorcide .
    cp reactorcide /job/src/deployment/

    # Build coordinator
    echo ""
    echo ">>> Building coordinator..."
    echo "----------------------------------------"
    build_and_push /job/src/deployment Dockerfile.coordinator "$REGISTRY/public/reactorcide/coordinator:$TAG"

    # Build worker
    echo ""
    echo ">>> Building worker..."
    echo "----------------------------------------"
    build_and_push /job/src/deployment Dockerfile.worker "$REGISTRY/public/reactorcide/worker:$TAG"

    # Cleanup coordinator/worker binary
    rm -f /job/src/deployment/reactorcide

    # Build webapp binary
    echo ""
    echo ">>> Building webapp..."
    echo "----------------------------------------"
    cd /job/src/webapp
    CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -buildvcs=false -ldflags="-w -s" -o reactorcide-web .
    cp reactorcide-web /job/src/deployment/

    # Build web
    build_and_push /job/src/deployment Dockerfile.web "$REGISTRY/public/reactorcide/web:$TAG"

    # Cleanup
    rm -f /job/src/deployment/reactorcide-web

    echo ""
    echo "========================================"
    echo "All images built and pushed successfully!"
    echo "========================================"
    echo ""
    echo "Images:"
    echo "  - $REGISTRY/public/reactorcide/runnerbase:$TAG"
    echo "  - $REGISTRY/public/reactorcide/coordinator:$TAG"
    echo "  - $REGISTRY/public/reactorcide/worker:$TAG"
    echo "  - $REGISTRY/public/reactorcide/web:$TAG"
  '
environment:
  REGISTRY: containers.catalystsquad.com
  TAG: dev
  REGISTRY_USER: "${env:REGISTRY_USER}"
  REGISTRY_PASSWORD: "${secret:reactorcide/local-dev:registry_password}"
