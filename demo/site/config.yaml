contentDir: "content"
outputDir: "generated"
templatesDir: "templates"
siteTitle: "Reactorcide Demo"
siteAddress: "https://demo.reactorcide.dev/"
descending: True
defaultExtension: ".html"
startPage: "index.html"

pageConfig:
    pageTitle: "Reactorcide Demo"
    pageDefaultTemplate: "page.jinja2"

blogConfig:
    title: "Reactorcide Demo Blog"
    blogBaseDir: "blog"
    blogTemplate: "blog.jinja2"
    listingTemplate: "listing.jinja2"
    listingPaginationNum: 5
    listingKeysNeeded: ['hook']
    atomFeeds: False
    tagsTemplate: "tags.jinja2"
    tagTemplate: "tag.jinja2"
    tagPaginationNum: 5
    authorsTemplate: "authors.jinja2"
    authorTemplate: "author.jinja2"
    authorPaginationNum: 10
