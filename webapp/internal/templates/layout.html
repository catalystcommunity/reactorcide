{{define "head"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} - Reactorcide</title>
    <style>
        :root {
            --bg: #0d1117;
            --bg-secondary: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-muted: #8b949e;
            --link: #58a6ff;
            --green: #3fb950;
            --red: #f85149;
            --yellow: #d29922;
            --blue: #58a6ff;
            --purple: #bc8cff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }
        a { color: var(--link); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 16px; }
        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 12px 0;
            margin-bottom: 24px;
        }
        header .container { display: flex; align-items: center; gap: 16px; }
        header h1 { font-size: 20px; font-weight: 600; }
        header nav a { color: var(--text-muted); font-size: 14px; }
        header nav a:hover { color: var(--text); }
        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
        }
        .status-completed { background: rgba(63, 185, 80, 0.15); color: var(--green); }
        .status-failed { background: rgba(248, 81, 73, 0.15); color: var(--red); }
        .status-running { background: rgba(88, 166, 255, 0.15); color: var(--blue); }
        .status-queued { background: rgba(210, 153, 34, 0.15); color: var(--yellow); }
        .status-cancelled { background: rgba(139, 148, 158, 0.15); color: var(--text-muted); }
        .status-unknown { background: rgba(139, 148, 158, 0.15); color: var(--text-muted); }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); }
        th { color: var(--text-muted); font-size: 12px; font-weight: 600; text-transform: uppercase; }
        tr:hover { background: var(--bg-secondary); }
        .meta { color: var(--text-muted); font-size: 13px; }
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 16px;
        }
        .card h2 { font-size: 16px; margin-bottom: 8px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }
        .grid dt { color: var(--text-muted); font-size: 12px; }
        .grid dd { font-size: 14px; margin-bottom: 8px; }
        .log-viewer {
            background: #010409;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            overflow-x: auto;
            max-height: 70vh;
            overflow-y: auto;
            font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 12px;
            line-height: 1.6;
        }
        .log-line { white-space: pre-wrap; word-break: break-all; }
        .log-stderr { color: var(--red); }
        .log-stdout { color: var(--text); }
        .log-timestamp { color: var(--text-muted); user-select: none; margin-right: 8px; }
        .pagination { display: flex; gap: 8px; margin: 16px 0; }
        .pagination a, .pagination span {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
        }
        .pagination a:hover { background: var(--bg-secondary); text-decoration: none; }
        .pagination span { color: var(--text-muted); }
        .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
        .filter-bar a {
            padding: 4px 10px;
            border: 1px solid var(--border);
            border-radius: 16px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .filter-bar a:hover, .filter-bar a.active {
            color: var(--text);
            background: var(--bg-secondary);
            text-decoration: none;
        }
        .stream-tabs { display: flex; gap: 4px; margin-bottom: 8px; }
        .stream-tabs a {
            padding: 4px 12px;
            border: 1px solid var(--border);
            border-radius: 6px 6px 0 0;
            font-size: 13px;
            color: var(--text-muted);
        }
        .stream-tabs a:hover, .stream-tabs a.active {
            color: var(--text);
            background: var(--bg-secondary);
            text-decoration: none;
            border-bottom-color: var(--bg-secondary);
        }
        .exit-success { color: var(--green); }
        .exit-failure { color: var(--red); }
        .error-page { text-align: center; padding: 48px 0; }
        .error-page h2 { font-size: 48px; color: var(--text-muted); }
        .error-page p { color: var(--text-muted); margin-top: 8px; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1><a href="/app/" style="color: var(--text)">Reactorcide</a></h1>
            <nav><a href="/app/jobs">Jobs</a></nav>
        </div>
    </header>
    <main class="container">
{{end}}
{{define "foot"}}
    </main>
</body>
</html>
{{end}}
