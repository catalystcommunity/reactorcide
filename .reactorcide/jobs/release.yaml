name: release
description: "Build containers, cross-compile CLI, version with semver-tags, and create GitHub release on merge to main"
triggers:
  events:
    - pull_request_merged
  branches:
    - main
job:
  image: golang:1.26-alpine
  command: |
    set -e
    apk add --no-cache git wget zip
    git clone "https://x-access-token:${GITHUB_PAT}@github.com/${REACTORCIDE_REPO}.git" /job/src
    sh /job/src/.reactorcide/jobs/scripts/release.sh
  timeout: 3600
  priority: 15
  working_dir: /job
  raw_command: true
  disable_run_local: true
  capabilities:
    - builder
  run_as:
    user: root
environment:
  REGISTRY_INTERNAL: "10.16.0.1:5000"
  REGISTRY_EXTERNAL: "containers.catalystsquad.com"
  GITHUB_PAT: "${secret:catalystcommunity/ci:githubpat}"
  REGISTRY_USER: "${secret:catalystcommunity/ci:registry_user}"
  REGISTRY_PASSWORD: "${secret:catalystcommunity/ci:registry_password}"
