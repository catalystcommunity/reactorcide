name: conventional-commits
description: "Validate all PR commits follow conventional commit format"
triggers:
  events:
    - pull_request_opened
    - pull_request_updated
  branches:
    - main
job:
  image: 10.16.0.1:5000/public/reactorcide/runnerbase:dev
  command: |
    set -e
    CODE_DIR="${REACTORCIDE_CODE_DIR:-/job/src}"
    if [ ! -d "${CODE_DIR}/.git" ]; then
      rm -rf "${CODE_DIR}"
      git clone "${REACTORCIDE_HEAD_URL:-$REACTORCIDE_SOURCE_URL}" "${CODE_DIR}"
      cd "${CODE_DIR}"
      git checkout "${REACTORCIDE_SHA:-${REACTORCIDE_HEAD_REF:-${REACTORCIDE_SOURCE_REF:-HEAD}}}"
    fi
    cd "${CODE_DIR}"
    if [ -n "${REACTORCIDE_BASE_URL}" ] && [ "${REACTORCIDE_BASE_URL}" != "${REACTORCIDE_HEAD_URL:-$REACTORCIDE_SOURCE_URL}" ]; then
      git remote get-url upstream >/dev/null 2>&1 || git remote add upstream "${REACTORCIDE_BASE_URL}"
      git fetch upstream "${REACTORCIDE_BASE_REF:-$REACTORCIDE_PR_BASE_REF}"
    fi

    echo "=== Validating Conventional Commits ==="
    PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?: .+'
    FAILED=0

    git log "${REACTORCIDE_DIFF_BASE}..HEAD" --pretty=format:"%H %s" > /tmp/commits.txt
    while IFS= read -r LINE; do
      HASH=$(echo "${LINE}" | cut -d' ' -f1)
      MSG=$(echo "${LINE}" | cut -d' ' -f2-)
      if echo "${MSG}" | grep -qE "${PATTERN}"; then
        echo "OK: ${MSG}"
      else
        echo "FAIL: ${MSG} (${HASH})"
        FAILED=1
      fi
    done < /tmp/commits.txt

    if [ "${FAILED}" = "1" ]; then
      echo ""
      echo "Commit messages must match: type(scope)?: description"
      echo "Valid types: feat, fix, docs, style, refactor, perf, test, build, ci, chore, revert"
      exit 1
    fi

    echo "All commits follow conventional commit format."

    # Trigger test jobs — runnerlib reads the YAML files, resolves them to
    # inline specs, and submits via both file and API (handles run-local and k8s)
    runnerlib trigger .reactorcide/jobs/test-go.yaml .reactorcide/jobs/test-python.yaml .reactorcide/jobs/test-web.yaml
  timeout: 300
  priority: 10
  working_dir: /job
  raw_command: true
  disable_run_local: true
