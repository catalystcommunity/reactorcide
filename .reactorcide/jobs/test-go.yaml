name: test-go
description: "Run Go tests for coordinator API"
job:
  image: golang:1.25
  command: |
    set -e
    export HOME="${HOME:-/tmp/reactorcide-home}"
    mkdir -p "$HOME"
    CODE_DIR="${REACTORCIDE_CODE_DIR:-/job/src}"
    if [ ! -d "${CODE_DIR}/.git" ]; then
      rm -rf "${CODE_DIR}"
      git clone "${REACTORCIDE_HEAD_URL:-$REACTORCIDE_SOURCE_URL}" "${CODE_DIR}"
      cd "${CODE_DIR}"
      git checkout "${REACTORCIDE_SHA:-${REACTORCIDE_HEAD_REF:-${REACTORCIDE_SOURCE_REF:-HEAD}}}"
    fi
    cd "${CODE_DIR}/coordinator_api"
    echo "=== Running Go Tests ==="
    go test $(go list ./... | grep -v '/test$') -count=1
  timeout: 1800
  priority: 10
  working_dir: /job
  raw_command: true
run_local:
  user: host
